<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Aqyldy Qala</title>
  <script defer src="app.js"></script>

  <style>
    :root {
      --bg: #e9e9e9;
      --card: rgba(255, 255, 255, 0.94);
      --text: #0d8fcb;
      --muted: #8b8b8b;
      --line: #e6e6e6;
      --input-bg: #fbfbfb;
      --btn: #16c6fb;
      --btn-hover: #025e8b;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.45), transparent 35%),
        linear-gradient(180deg, #ededed 0%, #e4e4e4 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 38px 34px 30px;
      backdrop-filter: blur(8px);
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .top-bar a {
      font-size: 13px;
      text-decoration: none;
      color: var(--muted);
      transition: color 0.2s ease;
    }

    .top-bar a:hover {
      color: var(--text);
    }

    .title {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .sub {
      margin: 0 0 24px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .input-wrap {
      position: relative;
    }

    .field input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--input-bg);
      font-size: 14px;
      color: #222;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .field input:focus {
      border-color: #bcbcbc;
      box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.04);
      background: #fff;
    }

    .password-input {
      padding-right: 44px !important;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 8px;
      color: #8c8c8c;
      display: grid;
      place-items: center;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .toggle-password:hover {
      background: rgba(0,0,0,0.05);
      color: #5e5e5e;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 6px 0 24px;
      flex-wrap: wrap;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .remember input {
      width: 14px;
      height: 14px;
      accent-color: #444;
      margin: 0;
    }

    .forgot {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      pointer-events: none;
      opacity: 0.7;
    }

    .main-btn {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 999px;
      background: var(--btn);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .main-btn:hover {
      background: var(--btn-hover);
      transform: translateY(-1px);
    }

    .bottom-note {
      margin-top: 18px;
      font-size: 12px;
      color: #9a9a9a;
      line-height: 1.5;
    }

    @media (max-width: 520px) {
      .card {
        padding: 28px 22px 24px;
      }

      .title {
        font-size: 22px;
      }

      .row {
        align-items: flex-start;
        flex-direction: column;
        margin-bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar">
      <a href="index.html">← На главную</a>
      <a href="register.html">Нет аккаунта? Регистрация</a>
      
    </div>

    <h1 class="title">Вход в аккаунт</h1>
    <p class="sub">
      Войдите, чтобы создавать обращения и видеть своё имя в шапке сайта.
    </p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Логин или email</label>
        <div class="input-wrap">
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Введите логин или email"
            autocomplete="username"
            required
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            class="password-input"
            placeholder="Введите пароль"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Показать пароль">
            👁
          </button>
        </div>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" name="remember" checked />
          Запомнить меня
        </label>

        <a href="#" class="forgot">Восстановление пароля</a>
      </div>

      <button type="submit" class="main-btn">Войти</button>
    </form>

    <div class="bottom-note">
      Вход работает через локальное сохранение в браузере.
      Если вы уже зарегистрировались, используйте те же данные.
    </div>
  </div>
</body>
</html>
